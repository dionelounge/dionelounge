<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiOne Lounge</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#000;
color:#fff;
}
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1600&auto=format&fit=crop') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}
.overlay{
background:rgba(0,0,0,.7);
padding:40px;
border-radius:20px;
}
h1{
font-size:70px;
color:#d4af37;
margin:0;
}
p{
font-size:22px;
}
.btn{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background:#d4af37;
color:#000;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}
.section{
padding:80px 20px;
text-align:center;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
}
.card{
background:#111;
padding:20px;
border-radius:20px;
border:1px solid #333;
}
footer{
padding:40px;
text-align:center;
background:#111;
}
</style>
</head>
<body>

<section class="hero">
<div class="overlay">
<h1>DiOne</h1>
<p>Hookah • Steak • Lounge</p>
<a class="btn" href="#">Menüyü Gör</a>
</div>
</section>

<section class="section">
<h2>Özel Menü</h2>
<div class="cards">
<div class="card">
<h3>Steak</h3>
<p>Premium et lezzetleri.</p>
</div>

<div class="card">
<h3>Burger</h3>
<p>Özel DiOne burgerleri.</p>
</div>

<div class="card">
<h3>Kokteyl</h3>
<p>Frozen ve özel içecekler.</p>
</div>
</div>
</section>

<footer>
DiOne Lounge • Ortaköy İstanbul
</footer>

</body>
</html>
