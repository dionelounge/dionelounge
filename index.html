<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiOne Lounge</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  color: white;
  background: url('https://i.imgur.com/7u6JkXW.jpg') no-repeat center center/cover;
}

/* KARARTMA (PROFESYONEL GÖRÜNÜM) */
.overlay {
  background: rgba(0,0,0,0.65);
  height: 100%;
  width: 100%;
}

/* ÜST BAR */
.topbar {
  position: absolute;
  top: 0;
  width: 100%;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  background: rgba(0,0,0,0.6);
}

/* ORTA ALAN */
.container {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* BAŞLIK */
h1 {
  font-size: 60px;
  letter-spacing: 3px;
  margin-bottom: 10px;
}

/* ALT YAZI */
.subtitle {
  font-size: 18px;
  opacity: 0.8;
  margin-bottom: 30px;
}

/* BUTONLAR */
.buttons {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 14px 28px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-size: 15px;
  transition: 0.3s;
  text-decoration: none;
}

/* ANA BUTON */
.btn-primary {
  background: #ff6a00;
  color: white;
}

.btn-primary:hover {
  background: #ff8533;
}

/* İKİNCİL */
.btn-outline {
  border: 1px solid white;
  color: white;
}

.btn-outline:hover {
  background: white;
  color: black;
}

/* ALT BİLGİ */
.footer {
  position: absolute;
  bottom: 20px;
  text-align: center;
  width: 100%;
  font-size: 14px;
  opacity: 0.8;
}

</style>
</head>

<body>

<div class="overlay">

  <!-- ÜST BAR -->
  <div class="topbar">
    <div>📍 Ortaköy / İstanbul</div>
    <div>
      📞 +90 531 765 31 32 | 
      📷 @diolounge
    </div>
  </div>

  <!-- ORTA -->
  <div class="container">
    <h1>DiOne Lounge</h1>
    <div class="subtitle">Ortaköy Boğaz Manzarasında Premium Deneyim</div>

    <div class="buttons">
      <a href="https://menum.co/DiOnee?qr-id=9%2F5FW42d" class="btn btn-primary">Menüyü Gör</a>

      <a href="https://wa.me/905317653132" class="btn btn-outline">WhatsApp</a>

      <a href="https://instagram.com/diolounge" class="btn btn-outline">Instagram</a>
    </div>
  </div>

  <!-- ALT -->
  <div class="footer">
    ⏰ Her Gün 11:00 - 01:00 Açık
  </div>

</div>

</body>
</html>
